<!DOCTYPE html>
<html>

<head>
    <title>Hover Effects and Transitions</title>

    <style>
        body {
            font-family: "Times New Roman";
            background: #f4f4f4;
            text-align: center;
        }

        /* Button Hover Effect */
        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.4s;
        }

        button:hover {
            background-color: #2ecc71;
            transform: scale(1.1);

        }

        /* Image Hover Effect */
        img {
            width: 250px;
            margin-top: 20px;
            transition: 0.5s;
        }

        img:hover {
            transform: rotate(5deg) scale(1.1);
        }

        /* Card Hover Effect */
        .card {
            width: 250px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0px 10px 20px black;
        }
    </style>
</head>

<body>

    <h1>CSS Hover Effects & Transitions</h1>

    <button>Hover Me</button>

    <br>

    <img src="5ffb351607079521d2d2b055555c7926.jpg" width=100>

    <div class="card">
        <h3>Hover Card</h3>
        <p>This card moves upward when hovered.</p>
    </div>

</body>

</html>
